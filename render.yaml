# ─── Render Blueprint ────────────────────────────────────────
# Push this to your repo and Render will auto-detect the config.
# Alternatively, use the Render dashboard to create a Web Service.

services:
  - type: web
    name: quickbite
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false   # You'll set this manually in the Render dashboard
      - key: PHP_SESSION_SECURE
        value: "1"
